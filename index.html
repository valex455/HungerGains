<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hunger Gains - Compete or Die</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: #f0f0f0; font-family: 'Segoe UI', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); padding: 24px; }
        .btn-action { background: linear-gradient(45deg, #ff4e50, #f9d423); color: black; font-weight: 900; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .btn-action:active { transform: scale(0.92); }
        .history-card { background: #1a1a1a; border-left: 5px solid #ff4e50; margin-bottom: 10px; padding: 12px; border-radius: 8px; }
    </style>
</head>
<body class="p-6 max-w-md mx-auto">

    <header class="text-center mb-8">
        <h1 class="text-5xl font-black italic tracking-tighter text-orange-500 uppercase">Hunger Gains</h1>
        <p id="date-display" class="text-gray-500 text-xs font-mono uppercase mt-2"></p>
    </header>

    <div class="glass-card mb-8 text-center shadow-2xl shadow-orange-900/20">
        <span class="text-gray-400 text-xs font-bold uppercase tracking-widest">Punteggio Stagione 2026</span>
        <h2 id="total-score" class="text-8xl font-black my-2 tracking-tighter">0</h2>
        <div class="flex justify-center gap-2 mt-4">
            <button onclick="shareWA()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-full text-xs font-bold flex items-center">
                📢 CONDIVIDI SU WHATSAPP
            </button>
        </div>
    </div>

    <div class="glass-card mb-8">
        <div class="space-y-4">
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase">Scegli Disciplina</label>
                <select id="sport" class="w-full bg-black/50 border border-white/10 p-4 rounded-xl mt-1 outline-none focus:border-orange-500" onchange="updateLabel()">
                    <option value="corsa">🏃 CORSA (2 pts/km)</option>
                    <option value="arrampicata">🧗 ARRAMPICATA (15 pts/h)</option>
                    <option value="calisthenics">🤸 CALISTHENICS (12 pts/h)</option>
                    <option value="pesi">🏋️ PESI (10 pts/h)</option>
                    <option value="nuoto">🏊 NUOTO (10 pts/km)</option>
                </select>
            </div>

            <div>
                <label id="vol-label" class="text-[10px] font-black text-gray-400 uppercase tracking-widest italic">Kilometri percorsi</label>
                <input type="number" id="volume" step="0.1" placeholder="Inserisci valore..." class="w-full bg-black/50 border border-white/10 p-4 rounded-xl mt-1 outline-none focus:border-orange-500 text-2xl font-bold">
            </div>

            <div class="grid grid-cols-2 gap-4 pt-2">
                <label class="flex items-center justify-center p-4 bg-white/5 rounded-xl border border-white/5 cursor-pointer has-[:checked]:border-orange-500">
                    <input type="checkbox" id="bonus-pr" class="hidden">
                    <span class="text-[10px] font-bold">🎯 BONUS PR/INTENSITÀ</span>
                </label>
                <label class="flex items-center justify-center p-4 bg-white/5 rounded-xl border border-white/5 cursor-pointer has-[:checked]:border-orange-500">
                    <input type="checkbox" id="bonus-combo" class="hidden">
                    <span class="text-[10px] font-bold">🔥 MULTI-SPORT DAY</span>
                </label>
            </div>

            <button onclick="addSession()" class="btn-action w-full py-5 rounded-2xl uppercase tracking-tighter text-xl">
                Registra Workout
            </button>
        </div>
    </div>

    <div>
        <div class="flex justify-between items-end mb-4 px-2">
            <h3 class="font-black italic uppercase text-gray-400">Ultime Sessioni</h3>
            <button onclick="clearData()" class="text-[9px] text-red-800 font-bold uppercase hover:text-red-500">Reset Dati</button>
        </div>
        <div id="history-log" class="space-y-3"></div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('hg_db')) || { total: 0, logs: [] };

        function updateLabel() {
            const s = document.getElementById('sport').value;
            document.getElementById('vol-label').innerText = (s === 'corsa' || s === 'nuoto') ? "Kilometri percorsi" : "Ore effettive";
        }

        function addSession() {
            const sport = document.getElementById('sport');
            const vol = parseFloat(document.getElementById('volume').value);
            if(!vol || vol <= 0) return alert("Inserisci un volume valido!");

            let base = 0;
            const type = sport.value;
            const bonusPr = document.getElementById('bonus-pr').checked;
            const bonusCo = document.getElementById('bonus-combo').checked;

            if(type === 'corsa') base = vol * 2;
            else if(type === 'arrampicata') base = vol * 15;
            else if(type === 'calisthenics') base = vol * 12;
            else if(type === 'pesi') base = vol * 10;
            else if(type === 'nuoto') base = vol * 10;

            let sessionPoints = base + (bonusPr ? 10 : 0) + (bonusCo ? 15 : 0);
            
            db.total += sessionPoints;
            db.logs.unshift({
                title: sport.options[sport.selectedIndex].text.split('(')[0],
                pts: sessionPoints.toFixed(1),
                date: new Date().toLocaleDateString('it-IT', {day: '2-digit', month: 'short'})
            });

            localStorage.setItem('hg_db', JSON.stringify(db));
            render();
            document.getElementById('volume').value = '';
        }

        function render() {
            document.getElementById('total-score').innerText = Math.floor(db.total);
            document.getElementById('history-log').innerHTML = db.logs.slice(0, 8).map(l => `
                <div class="history-card flex justify-between items-center">
                    <div>
                        <div class="font-black uppercase text-sm">${l.title}</div>
                        <div class="text-[10px] text-gray-500 font-mono">${l.date}</div>
                    </div>
                    <div class="text-xl font-black text-orange-500">+${l.pts}</div>
                </div>
            `).join('');
        }

        function shareWA() {
            const text = `🏆 *HUNGER GAINS 2026* %0AMio Punteggio Attuale: *${Math.floor(db.total)} punti*%0A🔥 Chi osa superarmi?`;
            window.open(`https://wa.me/?text=${text}`, '_blank');
        }

        function clearData() {
            if(confirm("Vuoi azzerare i tuoi punti?")) {
                db = { total: 0, logs: [] };
                localStorage.setItem('hg_db', JSON.stringify(db));
                render();
            }
        }

        document.getElementById('date-display').innerText = new Date().toDateString();
        render();
    </script>
</body>
</html>
